services:

  postgres:
    build:
      context: ./docker
      dockerfile: postgres/Dockerfile
    image: onec-postgres:latest
    container_name: onec-postgres
    environment:
      POSTGRES_PASSWORD: postgres1c
      POSTGRES_DB: demo_vkr
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/16/main
    networks:
      - onec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  onec:
    build:
      context: ./docker
      dockerfile: onec/Dockerfile
    image: onec-test:latest
    container_name: onec-test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DISPLAY: ":99"
    volumes:
      - ./config:/workspace/config:ro
      - ./tests:/workspace/tests:ro
      - ./scripts:/workspace/scripts:ro
      - ./tools:/workspace/tools:ro
      - ./reports:/workspace/reports
      - ./docker/licenses:/var/1C/licenses:ro
    networks:
      - onec-net
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: >
      bash -c "Xvfb :99 -screen 0 1024x768x16 & sleep 2 && tail -f /dev/null"

volumes:
  pg-data:

networks:
  onec-net:
    driver: bridge